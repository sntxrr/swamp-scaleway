  - name: zone-scoped
    description: Services scoped by availability zone, swept across every input zone.
    concurrency: 6
    dependsOn: []
    weight: 0
    steps:
      - name: list-servers-${{ self.zone }}
        description: Discover every servers in ${{ self.zone }}.
        forEach:
          item: zone
          in: ${{ inputs.zones }}
        task:
          type: model_method
          modelType: "@sntxrr/scaleway-instance"
          modelName: inv-instance
          methodName: list
          inputs:
            secretKey: ${{ vault.get(scaleway, SCW_SECRET_KEY) }}
            projectId: ${{ inputs.projectId }}

id: db90b346-54d1-450e-b53e-3e0fcee062c6
name: fleet-inventory
description: >-
  Full read-only inventory of a Scaleway account: every resource type, in every
  region and availability zone. Each step calls a factory `list` method, so one
  step discovers all resources of that type in one scope — no per-resource
  looping.

  Steps fan out with forEach across inputs.regions / inputs.zones, and each
  writes data varied by that dimension, so fr-par and nl-ams results version
  independently rather than overwriting one another.

  Every step is allowFailure: a service the account doesn't use, isn't entitled
  to, or that rejects a scope (webhosting is fr-par-only; public-gateway serves
  it-mil-1 but not fr-par-3) degrades that one step instead of the sweep.

  Because swamp versions every data write, re-running turns these snapshots into
  a drift record: `swamp data list <name>` shows what changed between sweeps.
tags: {}

# Scheduled runs get no --input, so trigger.inputs supplies the baseline.
# Precedence: caller --input > trigger.inputs > schema defaults.
trigger:
  schedule: "0 6 * * *"
  inputs:
    projectId: 76775539-7ff9-4f1a-a0f2-4a262a82c911
    organizationId: 76775539-7ff9-4f1a-a0f2-4a262a82c911

inputs:
  properties:
    projectId:
      type: string
      description: Scaleway Project ID to inventory.
    organizationId:
      type: string
      description: Organization ID, for the org-scoped steps (projects, IAM apps).
    regions:
      type: array
      items:
        type: string
      default: ["fr-par", "nl-ams", "pl-waw"]
      description: Regions to sweep for region-scoped services.
    zones:
      type: array
      items:
        type: string
      default: ["fr-par-1", "fr-par-2", "fr-par-3", "nl-ams-1", "nl-ams-2", "nl-ams-3", "pl-waw-1", "pl-waw-2", "pl-waw-3"]
      description: Availability zones to sweep for zone-scoped services.
  required: ["projectId", "organizationId"]

jobs:
  - name: global-scoped
    description: Services with no region or zone dimension.
    concurrency: 3
    dependsOn: []
    weight: 0
    steps:
      - name: list-dns-zones
        description: Discover every DNS zone in the project (global API).
        task:
          type: model_method
          modelType: "@sntxrr/scaleway-dns"
          modelName: inv-dns
          methodName: list-zones
          inputs:
            secretKey: ${{ vault.get(scaleway, SCW_SECRET_KEY) }}
            projectId: ${{ inputs.projectId }}
        dependsOn: []
        weight: 0
        allowFailure: true

      - name: list-projects
        description: Discover every project in the organization.
        task:
          type: model_method
          modelType: "@sntxrr/scaleway-account"
          modelName: inv-account
          methodName: list
          inputs:
            secretKey: ${{ vault.get(scaleway, SCW_SECRET_KEY) }}
            organizationId: ${{ inputs.organizationId }}
        dependsOn: []
        weight: 0
        allowFailure: true

      - name: list-iam-applications
        description: Discover every IAM application in the organization.
        task:
          type: model_method
          modelType: "@sntxrr/scaleway-iam"
          modelName: inv-iam
          methodName: list
          inputs:
            secretKey: ${{ vault.get(scaleway, SCW_SECRET_KEY) }}
            organizationId: ${{ inputs.organizationId }}
        dependsOn: []
        weight: 0
        allowFailure: true

  - name: region-scoped
    description: Services scoped by region, swept across every input region.
    # Politeness cap on concurrent Scaleway API calls.
    concurrency: 6
    dependsOn: []
    weight: 0
    steps:
      - name: list-vpcs-${{ self.region }}
        description: Discover every vpcs in ${{ self.region }}.
        forEach:
          item: region
          in: ${{ inputs.regions }}
        task:
          type: model_method
          modelType: "@sntxrr/scaleway-vpc"
          modelName: inv-vpc
          methodName: list
          inputs:
            secretKey: ${{ vault.get(scaleway, SCW_SECRET_KEY) }}
            projectId: ${{ inputs.projectId }}
            region: ${{ self.region }}
          dataOutputOverrides:
            - specName: vpc
              vary:
                - region
        dependsOn: []
        weight: 0
        allowFailure: true
      - name: list-ips-${{ self.region }}
        description: Discover every ips in ${{ self.region }}.
        forEach:
          item: region
          in: ${{ inputs.regions }}
        task:
          type: model_method
          modelType: "@sntxrr/scaleway-ipam"
          modelName: inv-ipam
          methodName: list
